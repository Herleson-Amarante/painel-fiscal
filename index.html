<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Tributária Gocase - 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; border: 2px solid #000; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const FINAL_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vRykG4Z4pN-ICEym8uYRPnvOJ18clvmM8eP5t2l10RBfrPGmad3TagyAF8qczDGBw/pub?output=csv`;
        
        const PROXIES = [
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
        ];

        function App() {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [taxes, setTaxes] = useState([]);
            const [meta, setMeta] = useState({ competence: '...', total: 0, efficiency: '0%' });
            const [loading, setLoading] = useState(true);
            const [proxyIndex, setProxyIndex] = useState(0);

            const fetchSheetData = useCallback(async () => {
                setLoading(true);
                try {
                    const fetchUrl = PROXIES[proxyIndex](FINAL_URL);
                    const response = await fetch(fetchUrl);
                    if (!response.ok) throw new Error('Falha na rede');
                    const csvText = await response.text();
                    
                    const rows = csvText.split(/\r?\n/).map(row => {
                        return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                    });

                    // Captura Metadados das células específicas
                    // Linha 3 (Index 2 no JS): Competência (Col B = Index 1), Eficiência (Col H = Index 7)
                    // Linha 4 (Index 3 no JS): Total (Col B = Index 1)
                    if (rows.length >= 4) {
                        setMeta({
                            competence: rows[2]?.[1] || '---',
                            efficiency: rows[2]?.[7] || '0%',
                            total: rows[3]?.[1] || '0'
                        });
                    }

                    // Processa apenas Linhas 5 a 88 (Index 4 a 87 no JS)
                    const targetData = rows.slice(4, 88);
                    const parsedData = targetData
                        .filter(cols => cols[3] && cols[3] !== "") // Só linhas com nome de obrigação
                        .map((cols, index) => ({
                            id: index,
                            empresa: cols[0] || '-',
                            regime: cols[1] || '-',
                            tipo: cols[2] || '-',
                            name: cols[3] || 'Obrigação',
                            prazo: cols[4] || '---',
                            situacao: cols[5] || '-',
                            responsible: cols[6] || 'Equipe',
                            status: (cols[7] || 'pendente').toLowerCase()
                        }));
                    
                    setTaxes(parsedData);
                } catch (err) {
                    setProxyIndex((prev) => (prev + 1) % PROXIES.length);
                } finally {
                    setLoading(false);
                }
            }, [proxyIndex]);

            useEffect(() => {
                fetchSheetData();
                const dataTimer = setInterval(fetchSheetData, 60000);
                const clockTimer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => { clearInterval(dataTimer); clearInterval(clockTimer); };
            }, [fetchSheetData]);

            const getStatusColor = (status) => {
                if (status.includes('pago') || status.includes('conclu') || status.includes('entregue')) return 'pago';
                if (status.includes('atraso')) return 'atrasado';
                return 'pendente';
            };

            return (
                <div className="h-screen flex flex-col p-6 lg:p-10 bg-[#020202]">
                    <header className="flex justify-between items-center mb-6 bg-zinc-900/40 p-6 rounded-[2rem] border border-zinc-800/50 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#FF4DAD] via-[#A855F7] to-[#00D4FF]"></div>
                        <div className="flex items-center gap-6">
                            <div className="w-16 h-16 bg-gradient-to-br from-[#FF4DAD] to-[#A855F7] rounded-2xl flex items-center justify-center">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M12 2v20M2 12h20M12 2l10 10-10 10L2 12z"/></svg>
                            </div>
                            <div>
                                <h1 className="text-4xl font-black text-white uppercase italic leading-none">GOCASE <span className="text-[#FF4DAD]">TAX</span></h1>
                                <p className="text-zinc-500 text-lg font-bold uppercase mt-1 tracking-wider">Comp: {meta.competence}</p>
                            </div>
                        </div>
                        <div className="text-right flex items-center gap-8">
                            <div>
                                <p className="text-zinc-500 text-xs font-black uppercase mb-1">Status de Entrega</p>
                                <div className="text-4xl font-black text-emerald-400 italic leading-none">{meta.efficiency}</div>
                            </div>
                            <div className="w-px h-12 bg-zinc-800"></div>
                            <div className="text-6xl font-mono font-black text-white tracking-tighter leading-none italic">
                                {currentTime.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 flex flex-col gap-6 overflow-hidden">
                        <div className="grid grid-cols-4 gap-6 shrink-0">
                            <Card title="Eficiência (H3)" value={meta.efficiency} color="emerald" />
                            <Card title="Total Obrigações (B4)" value={meta.total} color="blue" />
                            <Card title="Pendentes" value={taxes.filter(t => getStatusColor(t.status) === 'pendente').length} color="yellow" />
                            <Card title="Atrasadas" value={taxes.filter(t => getStatusColor(t.status) === 'atrasado').length} color="red" pulse={taxes.some(t => getStatusColor(t.status) === 'atrasado')} />
                        </div>

                        <div className="flex-1 bg-zinc-900/10 border border-zinc-800/40 rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl backdrop-blur-md">
                            <div className="grid grid-cols-12 gap-4 px-10 py-4 bg-zinc-800/20 text-zinc-500 text-xs font-black uppercase tracking-widest border-b border-zinc-800/40 italic">
                                <div className="col-span-3">Empresa / Tipo</div>
                                <div className="col-span-3">Obrigação Tributária</div>
                                <div className="col-span-2 text-center">Prazo</div>
                                <div className="col-span-2 text-center">Status</div>
                                <div className="col-span-2 text-right">Responsável</div>
                            </div>

                            <div className="flex-1 overflow-y-auto px-4 py-2 custom-scrollbar">
                                <div className="flex flex-col gap-2">
                                    {taxes.length > 0 ? (
                                        taxes.map((tax) => {
                                            const statusType = getStatusColor(tax.status);
                                            return (
                                                <div key={tax.id} className="grid grid-cols-12 gap-4 px-8 py-4 bg-zinc-900/40 rounded-[1.2rem] border border-zinc-800/30 items-center transition-all">
                                                    <div className="col-span-3">
                                                        <p className="text-lg font-bold text-white uppercase truncate">{tax.empresa}</p>
                                                        <p className="text-zinc-600 text-[10px] font-black uppercase">{tax.regime} • {tax.tipo}</p>
                                                    </div>
                                                    <div className="col-span-3">
                                                        <p className="text-xl font-black text-zinc-200 uppercase leading-tight">{tax.name}</p>
                                                        <p className="text-[#A855F7] text-[10px] font-bold uppercase">{tax.situacao}</p>
                                                    </div>
                                                    <div className="col-span-2 text-center text-2xl font-mono font-black text-zinc-400">
                                                        {tax.prazo}
                                                    </div>
                                                    <div className="col-span-2 flex justify-center">
                                                        <Badge status={statusType} label={tax.status} />
                                                    </div>
                                                    <div className="col-span-2 text-right text-sm font-black text-zinc-500 italic uppercase underline decoration-[#FF4DAD] underline-offset-4">{tax.responsible}</div>
                                                </div>
                                            );
                                        })
                                    ) : (
                                        <div className="flex flex-col items-center justify-center h-full opacity-20">
                                            <p className="text-2xl font-black italic uppercase">Buscando dados linha 5-88...</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Card({ title, value, color, pulse }) {
            const colors = {
                emerald: 'text-emerald-400 border-emerald-500/20 bg-emerald-500/5',
                blue: 'text-blue-400 border-blue-500/20 bg-blue-500/5',
                yellow: 'text-yellow-400 border-yellow-500/20 bg-yellow-500/5',
                red: 'text-red-500 border-red-500/20 bg-red-500/5'
            };
            return (
                <div className={`p-4 rounded-[1.5rem] border ${colors[color]} flex flex-col justify-center h-32 relative ${pulse ? 'animate-pulse-soft' : ''}`}>
                    <span className="text-[10px] font-black uppercase opacity-60 tracking-tighter italic mb-1">{title}</span>
                    <div className="text-5xl font-black tracking-tighter italic leading-none">{value}</div>
                </div>
            );
        }

        function Badge({ status, label }) {
            const styles = {
                pago: 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20',
                atrasado: 'bg-red-500/10 text-red-500 border-red-500/20 animate-pulse',
                pendente: 'bg-zinc-800 text-zinc-400 border-zinc-700'
            };
            return (
                <span className={`px-4 py-1 rounded-lg font-black text-[10px] border tracking-widest uppercase ${styles[status]}`}>
                    {label}
                </span>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
