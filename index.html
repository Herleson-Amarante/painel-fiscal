<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gocase Tax | Agenda Tributária</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #F3F4F6; 
            color: #111827; 
            margin: 0; 
            overflow: hidden; 
        }
        .animate-slide {
            animation: slideIn 0.5s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        ::-webkit-scrollbar { display: none; }
        .loading-overlay {
            background: rgba(243, 244, 246, 0.85);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const BASE_SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRykG4Z4pN-ICEym8uYRPnvOJ18clvmM8eP5t2l10RBfrPGmad3TagyAF8czDGBw/pub?output=csv";
        
        const CONFIG_COMPETENCIAS = [
            { id: '0', nome: 'Agenda Jan.2026' },
            { id: '802166840', nome: 'Agenda Fev.2026' },
            { id: '135792468', nome: 'Agenda Mar.2026' },
        ];

        const PROXIES = [
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://thingproxy.freeboard.io/fetch/${url}`
        ];

        const ITEMS_PER_PAGE = 5;
        const SECONDS_PER_PAGE = 12; // Um pouco mais de tempo para ler itens concluídos
        const REQUEST_TIMEOUT = 12000;

        function App() {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [taxes, setTaxes] = useState([]);
            const [meta, setMeta] = useState({ qtdTotal: '0', qtdAcessorias: '0', efficiency: '0%' });
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);
            const [proxyIndex, setProxyIndex] = useState(0);
            const [currentPage, setCurrentPage] = useState(0);
            const [isPaused, setIsPaused] = useState(false);

            const [selectedGid, setSelectedGid] = useState(() => {
                return localStorage.getItem('gocase_selected_gid') || CONFIG_COMPETENCIAS[0].id;
            });

            const fetchWithTimeout = async (url, options = {}, timeout = REQUEST_TIMEOUT) => {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                try {
                    const response = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(id);
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    return await response.text();
                } catch (err) {
                    clearTimeout(id);
                    throw err;
                }
            };

            const fetchSheetData = useCallback(async (forcedGid) => {
                const targetGid = forcedGid || selectedGid;
                let success = false;
                let currentTryProxy = proxyIndex;

                for (let i = 0; i < 3; i++) {
                    try {
                        const fetchUrlWithGid = `${BASE_SPREADSHEET_URL}&gid=${targetGid}&single=true&t=${Date.now()}`;
                        const fetchUrl = PROXIES[currentTryProxy](fetchUrlWithGid);
                        
                        const csvText = await fetchWithTimeout(fetchUrl);
                        
                        const rows = csvText.split(/\r?\n/).map(row => {
                            return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                        });

                        if (rows.length >= 4) {
                            setMeta({
                                qtdTotal: rows[2]?.[1] || '0',
                                efficiency: rows[2]?.[8] || '0%',
                                qtdAcessorias: rows[3]?.[1] || '0'
                            });
                        }

                        const targetData = rows.slice(5, 150); // Pegando um range maior de linhas
                        const today = new Date();
                        today.setHours(0,0,0,0);

                        const parsedData = targetData
                            .filter(cols => cols[4] && cols[4] !== "" && cols[4] !== "Obrigações") 
                            .map((cols, index) => {
                                const statusValue = (cols[8] || '').toLowerCase();
                                const isDone = statusValue.includes('pago') || statusValue.includes('conclu') || statusValue.includes('entregue') || statusValue.includes('ok');

                                const item = {
                                    id: index,
                                    empresa: cols[0] || '-',
                                    uf: cols[1] || '-',
                                    regime: cols[2] || '-',
                                    tipo: cols[3] || '-',
                                    name: cols[4] || 'Obrigação',
                                    prazo: cols[5] || '---',
                                    situacao: cols[6] || '-',
                                    responsible: cols[7] || 'Equipe',
                                    status: statusValue,
                                    isDone: isDone
                                };

                                let diffDays = 999;
                                if (item.prazo && item.prazo.includes('/')) {
                                    const [d, m, y] = item.prazo.split('/');
                                    const fullYear = y && y.length === 2 ? `20${y}` : y;
                                    const dueDate = new Date(fullYear, m - 1, d);
                                    if (!isNaN(dueDate.getTime())) {
                                        const diffTime = dueDate.getTime() - today.getTime();
                                        diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                                    }
                                }

                                let urgency = 'normal';
                                if (isDone) {
                                    urgency = 'entregue';
                                } else {
                                    if (diffDays < 0) urgency = 'atrasado';
                                    else if (diffDays <= 2) urgency = 'alerta';
                                }

                                return { ...item, diffDays, urgency };
                            });
                        
                        setTaxes(parsedData);
                        setLoading(false);
                        setErrorMsg(null);
                        success = true;
                        setProxyIndex(currentTryProxy);
                        break; 
                    } catch (err) {
                        currentTryProxy = (currentTryProxy + 1) % PROXIES.length;
                        await new Promise(r => setTimeout(r, 1000));
                    }
                }

                if (!success) {
                    setErrorMsg("Falha na sincronização. Tentando reconectar...");
                }
            }, [proxyIndex, selectedGid]);

            useEffect(() => {
                fetchSheetData();
                const dataTimer = setInterval(() => fetchSheetData(), 60000);
                const clockTimer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => { clearInterval(dataTimer); clearInterval(clockTimer); };
            }, [fetchSheetData]);

            // LISTA PRINCIPAL: Agora inclui TUDO (Pendentes + Entregues)
            // Priorizamos a ordem: Atrasadas primeiro, Alertas depois, e por fim Entregues (por data mais recente)
            const allItemsForPagination = [...taxes].sort((a, b) => {
                const order = { 'atrasado': 0, 'alerta': 1, 'normal': 2, 'entregue': 3 };
                return order[a.urgency] - order[b.urgency];
            });

            const totalPages = Math.ceil(allItemsForPagination.length / ITEMS_PER_PAGE) || 1;

            useEffect(() => {
                if (currentPage >= totalPages) setCurrentPage(0);
            }, [totalPages, currentPage]);

            useEffect(() => {
                if (totalPages <= 1 || isPaused || loading) return;
                const pageTimer = setInterval(() => {
                    setCurrentPage(prev => (prev + 1) % totalPages);
                }, SECONDS_PER_PAGE * 1000);
                return () => clearInterval(pageTimer);
            }, [totalPages, isPaused, loading]);

            const handleCompetenceChange = (e) => {
                const newGid = e.target.value;
                setSelectedGid(newGid);
                localStorage.setItem('gocase_selected_gid', newGid);
                setTaxes([]);
                setLoading(true);
                fetchSheetData(newGid);
            };

            const currentDisplayItems = allItemsForPagination.slice(
                currentPage * ITEMS_PER_PAGE, 
                (currentPage + 1) * ITEMS_PER_PAGE
            );

            return (
                <div className="h-screen flex flex-col p-6 lg:p-8 bg-[#F3F4F6] relative">
                    
                    {loading && taxes.length === 0 && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center loading-overlay">
                            <div className="w-16 h-16 border-4 border-[#FF2A7F] border-t-transparent rounded-full animate-spin mb-4"></div>
                            <p className="text-[#FF2A7F] font-black uppercase tracking-widest animate-pulse text-xl text-center px-10">
                                {errorMsg ? errorMsg : `Sincronizando Dados...`}
                            </p>
                        </div>
                    )}

                    <header className="flex justify-between items-center mb-6 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 relative">
                        <div className="flex items-center gap-4">
                            <div className="bg-black text-white px-6 py-3 rounded-full font-black text-3xl tracking-tighter flex items-center gap-2">
                                gocase <span className="w-3 h-3 bg-[#FF2A7F] rounded-full inline-block mb-1"></span>
                            </div>
                            <div className="h-10 w-px bg-slate-200 mx-2"></div>
                            <div>
                                <h1 className="text-2xl font-bold text-slate-800 uppercase tracking-tight">Agenda Tributária</h1>
                                <p className="text-slate-400 text-sm font-semibold tracking-widest uppercase">Monitoramento 2026</p>
                            </div>
                        </div>
                        
                        <div className="text-right flex items-center gap-6">
                            <div className="flex flex-col justify-center bg-slate-50 px-4 py-2 rounded-xl border border-slate-200 shadow-sm min-w-[220px]">
                                <p className="text-slate-400 text-[9px] font-black uppercase mb-0.5 tracking-widest text-left">Aba Ativa</p>
                                <select 
                                    value={selectedGid}
                                    onChange={handleCompetenceChange}
                                    className="bg-transparent border-none text-[#FF2A7F] font-black outline-none cursor-pointer text-base p-0 focus:ring-0 uppercase tracking-tight"
                                >
                                    {CONFIG_COMPETENCIAS.map(comp => (
                                        <option key={comp.id} value={comp.id} className="text-slate-800 font-bold">{comp.nome}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="flex gap-6">
                                <div className="text-right">
                                    <p className="text-slate-400 text-xs font-bold uppercase mb-1">Pendentes</p>
                                    <div className="text-2xl font-black text-slate-800">
                                        {taxes.filter(t => !t.isDone).length}
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-slate-400 text-xs font-bold uppercase mb-1">Eficiência</p>
                                    <div className="text-2xl font-black text-[#FF2A7F]">{meta.efficiency}</div>
                                </div>
                            </div>
                            <div className="w-px h-10 bg-slate-200"></div>
                            <div className="text-5xl font-black text-black tracking-tighter min-w-[150px]">
                                {currentTime.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 flex flex-col gap-6 overflow-hidden">
                        
                        <div className="grid grid-cols-4 gap-6 shrink-0">
                            <SummaryCard title="Meta de Entrega" value={meta.efficiency} color="pink" />
                            <SummaryCard title="Total de Obrigações" value={meta.qtdTotal} color="dark" />
                            <SummaryCard title="Concluídas" value={taxes.filter(t => t.isDone).length} color="green" />
                            <SummaryCard title="Atrasadas" value={taxes.filter(t => t.urgency === 'atrasado').length} color="red" />
                        </div>

                        <div className="flex-1 bg-white rounded-[2.5rem] overflow-hidden flex flex-col shadow-lg border border-slate-100 relative">
                            
                            {!isPaused && totalPages > 1 && (
                                <div className="absolute top-0 left-0 w-full h-1 bg-slate-100">
                                    <div 
                                        className="h-full bg-[#FF2A7F] transition-all ease-linear"
                                        style={{ width: `${((currentPage + 1) / totalPages) * 100}%`, transitionDuration: '0.3s' }}
                                    ></div>
                                </div>
                            )}

                            <div className="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-white">
                                <div className="flex items-center gap-3">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center bg-slate-100`}>
                                        <svg className="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                                        </svg>
                                    </div>
                                    <h2 className="text-xl font-black text-slate-800 uppercase tracking-tight">Fluxo de Obrigações</h2>
                                    <span className="text-xs font-bold text-slate-400 ml-4 px-3 py-1 bg-slate-50 rounded-full border border-slate-100 uppercase">
                                        Pág {currentPage + 1} de {totalPages}
                                    </span>
                                </div>
                                
                                <div className="flex items-center gap-4">
                                    <div className="flex items-center bg-slate-100 rounded-xl p-1">
                                        <button 
                                            onClick={() => setIsPaused(!isPaused)} 
                                            className={`px-4 py-2 rounded-lg transition-all font-bold text-xs uppercase ${isPaused ? 'bg-[#FF2A7F] text-white' : 'text-slate-500'}`} >
                                            {isPaused ? 'Pausado' : 'Automático'}
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-12 gap-4 px-8 py-4 bg-slate-50 text-slate-400 text-xs font-black uppercase tracking-widest border-b border-slate-100">
                                <div className="col-span-3">Empresa / UF</div>
                                <div className="col-span-3">Obrigação</div>
                                <div className="col-span-2 text-center">Prazo</div>
                                <div className="col-span-2 text-center">Status</div>
                                <div className="col-span-2 text-right">Responsável</div>
                            </div>

                            <div className="flex-1 px-4 py-4 overflow-hidden flex flex-col justify-start gap-3 mt-2">
                                {currentDisplayItems.map((tax, idx) => (
                                    <div 
                                        key={`${tax.id}-${idx}`} 
                                        className={`grid grid-cols-12 gap-4 px-6 py-5 rounded-2xl border shadow-sm items-center animate-slide ${
                                            tax.isDone ? 'bg-white border-slate-100 opacity-70' : 'bg-white border-slate-200'
                                        }`}
                                        style={{ animationDelay: `${idx * 0.08}s` }}
                                    >
                                        <div className="col-span-3">
                                            <p className={`text-base font-bold uppercase truncate ${tax.isDone ? 'text-slate-400' : 'text-slate-800'}`}>
                                                {tax.empresa}
                                            </p>
                                            <div className="flex items-center gap-2 mt-1">
                                                <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${tax.isDone ? 'bg-slate-50 text-slate-400' : 'bg-slate-100 text-slate-500'}`}>
                                                    {tax.uf}
                                                </span>
                                                <span className="text-slate-400 text-[10px] font-bold uppercase truncate">{tax.regime}</span>
                                            </div>
                                        </div>
                                        <div className="col-span-3">
                                            <p className={`text-lg font-black uppercase leading-tight truncate ${tax.isDone ? 'text-slate-400 line-through' : 'text-black'}`}>
                                                {tax.name}
                                            </p>
                                            <p className={`text-xs font-bold uppercase truncate mt-0.5 ${tax.isDone ? 'text-slate-300' : 'text-[#FF2A7F]'}`}>
                                                {tax.tipo}
                                            </p>
                                        </div>
                                        <div className="col-span-2 text-center">
                                            <p className={`text-xl font-bold ${tax.isDone ? 'text-slate-400' : 'text-slate-800'}`}>{tax.prazo}</p>
                                            <p className={`text-[10px] font-black uppercase mt-1 ${
                                                tax.isDone ? 'text-green-500' : 
                                                tax.urgency === 'atrasado' ? 'text-red-500' : 'text-yellow-500'
                                            }`}>
                                                {tax.isDone ? 'CONCLUÍDO' : 
                                                 tax.diffDays < 0 ? `${Math.abs(tax.diffDays)} dias atrasado` : 
                                                 tax.diffDays === 0 ? 'Vence Hoje' : `Em ${tax.diffDays} dias`}
                                            </p>
                                        </div>
                                        <div className="col-span-2 flex justify-center">
                                            <span className={`px-4 py-1.5 rounded-lg font-black text-xs uppercase tracking-wider border flex items-center gap-2 ${
                                                tax.isDone ? 'bg-green-50 text-green-600 border-green-100' :
                                                tax.urgency === 'atrasado' ? 'bg-red-50 text-red-600 border-red-200' : 'bg-yellow-50 text-yellow-600 border-yellow-200'
                                            }`}>
                                                {tax.isDone && <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>}
                                                {tax.isDone ? 'Entregue' : (tax.situacao || tax.status)}
                                            </span>
                                        </div>
                                        <div className="col-span-2 text-right">
                                            <p className={`text-sm font-black uppercase ${tax.isDone ? 'text-slate-300' : 'text-slate-600'}`}>
                                                {tax.responsible}
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function SummaryCard({ title, value, color }) {
            const themes = {
                pink: 'bg-white border-slate-100 text-[#FF2A7F]',
                dark: 'bg-black border-black text-white',
                green: 'bg-green-50 border-green-100 text-green-600',
                red: 'bg-red-50 border-red-100 text-red-500'
            };
            const themeClass = themes[color] || themes.pink;
            const textClassNames = (color === 'dark') ? 'text-slate-400' : 'text-slate-500';

            return (
                <div className={`p-6 rounded-[2rem] border shadow-sm flex flex-col justify-center h-36 ${themeClass}`}>
                    <span className={`text-[10px] font-bold uppercase tracking-widest mb-2 ${textClassNames}`}>{title}</span>
                    <div className="text-5xl font-black tracking-tighter">{value}</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
