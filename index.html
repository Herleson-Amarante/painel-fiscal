<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Tributária Gocase - 2026</title>
    <!-- Scripts estáveis -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; border: 2px solid #000; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #050505; color: #FF4DAD; font-family: sans-serif; font-weight: bold; font-size: 24px;">
            INICIALIZANDO GOCASE TAX...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- CONFIGURAÇÃO DA PLANILHA ---
        const SHEET_ID = "2PACX-1vRykG4Z4pN-ICEym8uYRPnvOJ18clvmM8eP5t2l10RBfrPGmad3TagyAF8qczDGBw";
        const ORIGINAL_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;
        
        // Lista expandida de Proxies para evitar o erro "Failed to fetch"
        const PROXIES = [
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://whateverproxy.herokuapp.com/get?url=${encodeURIComponent(url)}`,
            (url) => `https://thingproxy.freeboard.io/fetch/${url}`
        ];

        function App() {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [taxes, setTaxes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);
            const [proxyIndex, setProxyIndex] = useState(0);

            const fetchSheetData = useCallback(async () => {
                setLoading(true);
                try {
                    const fetchUrl = PROXIES[proxyIndex](ORIGINAL_URL);
                    const response = await fetch(fetchUrl);
                    
                    if (!response.ok) throw new Error('Proxy offline');
                    
                    const csvText = await response.text();
                    
                    if (!csvText || !csvText.includes(",")) {
                        throw new Error('CSV Inválido');
                    }

                    const rows = csvText.split(/\r?\n/).map(row => row.trim()).filter(row => row.length > 0);
                    if (rows.length < 2) throw new Error('Sem dados');

                    const dataRows = rows.slice(1);
                    const parsedData = dataRows.map((line, index) => {
                        const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        const cleanCols = cols.map(c => c.replace(/^"|"$/g, '').trim());

                        return {
                            id: index,
                            name: cleanCols[0] || 'Obrigação',
                            state: cleanCols[1] || '-',
                            dueDate: cleanCols[2] || '---',
                            status: (cleanCols[3] || 'pendente').toLowerCase(),
                            responsible: cleanCols[4] || 'Equipe',
                            competence: cleanCols[5] || '---'
                        };
                    });
                    
                    setTaxes(parsedData);
                    setErrorMsg(null);
                } catch (err) {
                    console.warn(`Tentativa com Proxy ${proxyIndex} falhou. Rotacionando...`);
                    // Rotaciona o proxy automaticamente
                    setProxyIndex((prev) => (prev + 1) % PROXIES.length);
                    setErrorMsg("Reconectando ao servidor...");
                } finally {
                    setLoading(false);
                }
            }, [proxyIndex]);

            useEffect(() => {
                fetchSheetData();
                const dataTimer = setInterval(fetchSheetData, 60000); // 1 minuto
                const clockTimer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => { clearInterval(dataTimer); clearInterval(clockTimer); };
            }, [fetchSheetData]);

            const getStatus = (tax) => {
                const today = new Date();
                today.setHours(0,0,0,0);
                
                let dateStr = tax.dueDate;
                if(dateStr.includes('/')) {
                    const parts = dateStr.split('/');
                    if (parts.length === 3) dateStr = `${parts[2]}-${parts[1]}-${parts[0]}`;
                }

                const due = new Date(dateStr + 'T00:00:00');
                const statusNormal = tax.status.toLowerCase();

                if (statusNormal.includes('pago') || statusNormal.includes('conclu') || statusNormal.includes('feito')) return 'pago';
                if (isNaN(due.getTime())) return 'pendente';
                if (due < today) return 'atrasado';
                if (due.getTime() === today.getTime()) return 'hoje';
                return 'pendente';
            };

            const processedTaxes = taxes.map(t => ({ ...t, currentStatus: getStatus(t) }));
            const stats = {
                total: processedTaxes.length,
                pago: processedTaxes.filter(t => t.currentStatus === 'pago').length,
                atrasado: processedTaxes.filter(t => t.currentStatus === 'atrasado').length,
                hoje: processedTaxes.filter(t => t.currentStatus === 'hoje').length,
            };
            const progress = stats.total > 0 ? Math.round((stats.pago / stats.total) * 100) : 0;

            return (
                <div className="h-screen flex flex-col p-6 lg:p-10 bg-[#020202]">
                    <header className="flex justify-between items-center mb-8 bg-zinc-900/40 p-6 rounded-[2rem] border border-zinc-800/50 relative overflow-hidden shadow-2xl">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#FF4DAD] via-[#A855F7] to-[#00D4FF]"></div>
                        <div className="flex items-center gap-6">
                            <div className="w-20 h-20 bg-gradient-to-br from-[#FF4DAD] to-[#A855F7] rounded-2xl flex items-center justify-center">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M12 2v20M2 12h20M12 2l10 10-10 10L2 12z"/></svg>
                            </div>
                            <div>
                                <h1 className="text-5xl font-black text-white uppercase tracking-tighter italic leading-none">GOCASE <span className="text-[#FF4DAD]">TAX</span></h1>
                                <p className="text-zinc-500 text-xl font-bold tracking-[0.2em] uppercase mt-1">Fiscal Hub 2026</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="text-7xl font-mono font-black text-white tracking-tighter leading-none italic">
                                {currentTime.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}
                            </div>
                            <div className="text-xl text-zinc-400 font-bold mt-1 uppercase tracking-widest">
                                {currentTime.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' })}
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 flex flex-col gap-8 overflow-hidden">
                        <div className="grid grid-cols-4 gap-6 shrink-0">
                            <Card title="Eficiência" value={`${progress}%`} color="emerald" progress={progress} />
                            <Card title="Entregues" value={stats.pago} color="emerald" icon="✓" />
                            <Card title="Vence Hoje" value={stats.hoje} color="yellow" icon="!" pulse={stats.hoje > 0} />
                            <Card title="Atrasadas" value={stats.atrasado} color="red" icon="⚠" pulse={stats.atrasado > 0} />
                        </div>

                        <div className="flex-1 bg-zinc-900/10 border border-zinc-800/40 rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl backdrop-blur-md">
                            <div className="px-10 py-6 border-b border-zinc-800/40 flex justify-between items-center bg-zinc-900/20">
                                <h2 className="text-2xl font-black text-white uppercase tracking-widest flex items-center gap-4 italic">
                                    <span className="w-2 h-8 bg-[#FF4DAD] rounded-full"></span> Calendário Fiscal
                                </h2>
                                {loading ? (
                                    <div className="text-[#00D4FF] animate-pulse font-black text-lg uppercase italic">Sincronizando...</div>
                                ) : errorMsg ? (
                                    <div className="text-zinc-600 font-black text-lg uppercase italic">{errorMsg}</div>
                                ) : (
                                    <div className="text-zinc-500 font-bold text-sm uppercase px-4 py-1 bg-zinc-800/30 rounded-lg">Online</div>
                                )}
                            </div>

                            <div className="grid grid-cols-12 gap-4 px-10 py-4 bg-zinc-800/10 text-zinc-500 text-sm font-black uppercase tracking-widest border-b border-zinc-800/40 italic">
                                <div className="col-span-5">Obrigação Tributária</div>
                                <div className="col-span-1 text-center">UF</div>
                                <div className="col-span-2 text-center">Data Limite</div>
                                <div className="col-span-2 text-center">Status</div>
                                <div className="col-span-2 text-right">Owner</div>
                            </div>

                            <div className="flex-1 overflow-y-auto px-6 py-4 custom-scrollbar">
                                <div className="flex flex-col gap-3">
                                    {processedTaxes.length > 0 ? (
                                        processedTaxes.sort((a,b) => {
                                            const order = { 'hoje': 0, 'atrasado': 1, 'pendente': 2, 'pago': 3 };
                                            return order[a.currentStatus] - order[b.currentStatus];
                                        }).map((tax) => (
                                            <div key={tax.id} className="grid grid-cols-12 gap-4 px-8 py-6 bg-zinc-900/20 hover:bg-zinc-800/30 rounded-[1.5rem] border border-zinc-800/30 items-center transition-all group">
                                                <div className="col-span-5">
                                                    <p className="text-2xl font-bold text-white group-hover:text-[#FF4DAD] transition-colors uppercase tracking-tight">{tax.name}</p>
                                                    <p className="text-zinc-600 text-lg font-bold">COMPETÊNCIA: {tax.competence}</p>
                                                </div>
                                                <div className="col-span-1 text-center">
                                                    <span className="px-3 py-1 bg-zinc-800 text-zinc-400 rounded-lg text-lg font-black italic">{tax.state}</span>
                                                </div>
                                                <div className="col-span-2 text-center text-3xl font-mono font-black text-zinc-300">
                                                    {tax.dueDate}
                                                </div>
                                                <div className="col-span-2 flex justify-center">
                                                    <Badge status={tax.currentStatus} />
                                                </div>
                                                <div className="col-span-2 text-right text-xl font-black text-zinc-500 italic underline decoration-[#A855F7] decoration-2 underline-offset-4">{tax.responsible}</div>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="flex flex-col items-center justify-center py-20">
                                            {!loading && (
                                                <div className="text-center">
                                                    <div className="text-[#FF4DAD] text-3xl font-black uppercase italic mb-4 animate-pulse">Conectando ao Banco de Dados...</div>
                                                    <p className="text-zinc-500 font-bold max-w-md uppercase text-sm tracking-widest">Tentando acesso via Proxy alternativo</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Card({ title, value, color, icon, progress, pulse }) {
            const colors = {
                emerald: 'text-emerald-400 border-emerald-500/20 bg-emerald-500/5',
                yellow: 'text-yellow-400 border-yellow-500/20 bg-yellow-500/5',
                red: 'text-red-500 border-red-500/20 bg-red-500/5'
            };
            return (
                <div className={`p-6 rounded-[2rem] border ${colors[color]} flex flex-col justify-between h-44 relative overflow-hidden shadow-xl ${pulse ? 'animate-pulse-soft ring-2 ring-current ring-offset-4 ring-offset-black' : ''}`}>
                    <div className="flex justify-between items-start">
                        <span className="text-lg font-black uppercase opacity-60 tracking-tighter italic">{title}</span>
                        {icon && <span className="text-4xl font-black opacity-80">{icon}</span>}
                    </div>
                    <div className="text-6xl font-black tracking-tighter leading-none italic">{value}</div>
                    {progress !== undefined && (
                        <div className="absolute bottom-0 left-0 h-2 bg-emerald-500 transition-all duration-1000 shadow-[0_0_15px_#10b981]" style={{width: `${progress}%`}}></div>
                    )}
                </div>
            );
        }

        function Badge({ status }) {
            const styles = {
                pago: 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20',
                hoje: 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20 animate-pulse',
                atrasado: 'bg-red-500/10 text-red-500 border-red-500/20 animate-bounce',
                pendente: 'bg-blue-500/10 text-blue-500 border-blue-500/20'
            };
            const labels = { pago: 'PAGO', hoje: 'HOJE', atrasado: 'CRÍTICO', pendente: 'AGENDADO' };
            return (
                <span className={`px-6 py-2 rounded-xl font-black text-lg border tracking-widest ${styles[status]}`}>
                    {labels[status]}
                </span>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
