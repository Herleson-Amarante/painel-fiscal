<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gocase Tax | Intelligence Dashboard Light</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --brand-pink: #FF4DAD; 
            --bg-light: #F8F9FA;
            --card-bg: #FFFFFF;
            --border-color: #E9ECEF;
            --text-main: #212529;
        }
        body { 
            background-color: var(--bg-light); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow: hidden;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .premium-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04);
        }
        .progress-bar-container {
            height: 3px;
            background: #F1F3F5;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--brand-pink);
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-in { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const COMPETENCIAS = [
            { label: "JAN-2026", gid: "0" },
            { label: "FEV-2026", gid: "802166840" }
        ];

        const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRykG4Z4pN-ICEym8uYRPnvOJ18clvmM8eP5t2l10RBfrPGmad3TagyAF8qczDGBw/pub?output=csv";
        
        const PROXIES = [
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
        ];

        function App() {
            const [rawData, setRawData] = useState([]);
            const [meta, setMeta] = useState({ efficiency: '0%', total: '0' });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [time, setTime] = useState(new Date());
            const [competenciaIdx, setCompetenciaIdx] = useState(1);
            const [currentPageType, setCurrentPageType] = useState('ATRASADO');

            const parseCSV = (text) => {
                if (!text) return [];
                const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
                return lines.map(line => {
                    const result = [];
                    let cell = "";
                    let inQuotes = false;
                    const separator = line.includes(';') ? ';' : ',';

                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === separator && !inQuotes) {
                            result.push(cell.trim());
                            cell = "";
                        } else cell += char;
                    }
                    result.push(cell.trim());
                    return result;
                });
            };

            const fetchWithRetry = async (url) => {
                for (const proxyFn of PROXIES) {
                    try {
                        const response = await fetch(proxyFn(url));
                        if (response.ok) return await response.text();
                    } catch (err) {}
                }
                throw new Error("Erro de conexão com a planilha.");
            };

            const loadData = useCallback(async () => {
                setLoading(true);
                const activeComp = COMPETENCIAS[competenciaIdx];
                const sheetUrl = `${BASE_URL}&gid=${activeComp.gid}&cb=${Date.now()}`;

                try {
                    const text = await fetchWithRetry(sheetUrl);
                    const rows = parseCSV(text);
                    
                    if (rows.length > 0) {
                        // Linha 3 (Index 2): Total (Col B/Index 1) e Eficiência (Col I/Index 8)
                        const headerRow = rows[2] || [];
                        setMeta({ 
                            efficiency: headerRow[8] || "0%", 
                            total: headerRow[1] || "0" 
                        });

                        // MAPEAMENTO SEGUINDO FIELMENTE A SEQUÊNCIA SOLICITADA:
                        const tasks = rows.slice(5)
                            .filter(r => r[0] && r[0] !== "Empresa")
                            .map((r, i) => ({
                                id: i,
                                empresa: r[0],      // A: Empresa
                                uf: r[1],           // B: UF
                                regime: r[2],       // C: Regime
                                tipo: r[3],         // D: Tipo
                                obrigacao: r[4],    // E: Obrigação
                                prazo: r[5],        // F: Prazo
                                situacao: (r[6] || "").toUpperCase(), // G: Situação (Status Visual)
                                responsavel: r[7],  // H: Responsável
                                statusInterno: r[8] // I: Status (Complementar)
                            }));
                        
                        setRawData(tasks);
                    }
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            }, [competenciaIdx]);

            useEffect(() => {
                loadData();
                const t = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(t);
            }, [loadData]);

            useEffect(() => {
                const statusOrder = ['ATRASADO', 'NO PRAZO', 'CONCLUÍDA'];
                const interval = setInterval(() => {
                    setCurrentPageType(p => statusOrder[(statusOrder.indexOf(p) + 1) % 3]);
                }, 10000);
                return () => clearInterval(interval);
            }, []);

            const filteredData = useMemo(() => {
                return rawData.filter(item => {
                    const sit = item.situacao;
                    if (currentPageType === 'CONCLUÍDA') return sit.includes('CONCLUÍDA') || sit.includes('OK') || sit.includes('ENTREGUE');
                    if (currentPageType === 'NO PRAZO') return sit.includes('NO PRAZO') || sit.includes('PENDENTE');
                    return sit.includes('ATRASADO');
                }).slice(0, 5);
            }, [rawData, currentPageType]);

            return (
                <div className="h-screen flex flex-col p-10 space-y-8">
                    {/* Header */}
                    <div className="flex justify-between items-center">
                        <div className="space-y-1">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 bg-[#FF4DAD] rounded-xl flex items-center justify-center shadow-lg">
                                    <i data-lucide="shield-check" className="text-white w-6 h-6"></i>
                                </div>
                                <h1 className="text-3xl font-[800] tracking-tighter uppercase italic text-zinc-900">
                                    Gocase<span className="text-[#FF4DAD]">.</span>Tax
                                </h1>
                            </div>
                            <p className="text-zinc-400 font-bold tracking-[0.2em] text-[10px] uppercase ml-1">Monitoramento Integrado 2026</p>
                        </div>

                        <div className="flex items-center gap-10 bg-white px-8 py-3 rounded-2xl border border-zinc-100 shadow-sm">
                            <div className="text-right">
                                <p className="text-[9px] font-black text-zinc-400 uppercase tracking-widest mb-1">Eficiência (Col I)</p>
                                <p className="text-3xl font-black font-mono text-[#FF4DAD] leading-none">{meta.efficiency}</p>
                            </div>
                            <div className="h-10 w-px bg-zinc-100"></div>
                            <div className="text-right text-5xl font-black font-mono tracking-tighter text-zinc-900 leading-none">
                                {time.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}
                            </div>
                        </div>
                    </div>

                    {/* KPI */}
                    <div className="grid grid-cols-4 gap-6">
                        <StatCard icon="database" label="Obrigações" value={meta.total} sub="Base Google Sheets" />
                        <StatCard icon="calendar" label="Competência" value={COMPETENCIAS[competenciaIdx].label} sub="Google Cloud Sync" />
                        <StatCard icon="filter" label="Status em Foco" value={currentPageType} color={currentPageType === 'ATRASADO' ? 'text-red-500' : 'text-blue-500'} />
                        <StatCard icon="zap" label="Status API" value={loading ? "Lendo..." : "Online"} color="text-emerald-500" />
                    </div>

                    {/* Table */}
                    <div className="flex-1 premium-card overflow-hidden flex flex-col relative bg-white">
                        <div className="progress-bar-container">
                            <div className="progress-bar-fill" key={currentPageType}></div>
                        </div>
                        
                        <div className="grid grid-cols-12 px-12 py-5 text-[10px] font-black text-zinc-400 uppercase tracking-[0.25em] border-b border-zinc-50 bg-zinc-50/50">
                            <div className="col-span-4">Empresa / Regime (A-C)</div>
                            <div className="col-span-4">Obrigação / Tipo (D-E)</div>
                            <div className="col-span-2 text-center">Prazo (F)</div>
                            <div className="col-span-2 text-right pr-4">Situação (G)</div>
                        </div>

                        <div className="flex-1 p-6 overflow-hidden">
                            {loading ? (
                                <div className="h-full flex items-center justify-center animate-pulse text-zinc-300 font-black">CARREGANDO...</div>
                            ) : (
                                <div className="space-y-4">
                                    {filteredData.map((item, idx) => (
                                        <div key={item.id} className="grid grid-cols-12 gap-4 p-6 bg-zinc-50/40 rounded-[1.5rem] items-center border border-zinc-100/60 animate-in" style={{animationDelay: `${idx * 0.1}s`}}>
                                            <div className="col-span-4 flex items-center gap-5">
                                                <div className="w-10 h-10 rounded-xl bg-white border border-zinc-100 flex items-center justify-center text-sm font-black text-zinc-800 shadow-sm">{item.uf}</div>
                                                <div>
                                                    <p className="text-[9px] font-bold text-[#FF4DAD] uppercase tracking-wider">{item.regime}</p>
                                                    <p className="text-base font-black text-zinc-900 uppercase truncate leading-tight">{item.empresa}</p>
                                                </div>
                                            </div>
                                            <div className="col-span-4">
                                                <p className="text-[9px] font-bold text-zinc-400 uppercase tracking-wider">{item.tipo}</p>
                                                <p className="text-base font-black text-zinc-800 uppercase truncate leading-tight">{item.obrigacao}</p>
                                            </div>
                                            <div className="col-span-2 text-center">
                                                <p className="text-xl font-black font-mono text-zinc-600">{item.prazo}</p>
                                                <p className="text-[8px] font-bold text-zinc-400 uppercase truncate">{item.responsavel} (H)</p>
                                            </div>
                                            <div className="col-span-2 flex flex-col items-end pr-4 gap-1">
                                                <StatusBadge status={item.situacao} />
                                                <span className="text-[8px] font-black text-zinc-300 uppercase italic">{item.statusInterno} (I)</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="flex justify-between items-center px-2">
                        <div className="flex bg-white p-1 rounded-xl border border-zinc-100 gap-1">
                            {COMPETENCIAS.map((c, i) => (
                                <button key={i} onClick={() => setCompetenciaIdx(i)} className={`px-4 py-1.5 text-[9px] font-black uppercase rounded-lg transition-all ${competenciaIdx === i ? 'bg-zinc-900 text-white' : 'text-zinc-400'}`}>
                                    {c.label}
                                </button>
                            ))}
                        </div>
                        <p className="text-[9px] font-black text-zinc-300 uppercase tracking-[0.2em]">Gocase Tax Engine v5.3 — Sequence Verified</p>
                    </div>
                </div>
            );
        }

        function StatCard({ icon, label, value, sub, color = "text-zinc-900" }) {
            return (
                <div className="premium-card p-6 flex flex-col justify-between">
                    <div className="flex justify-between items-start mb-4">
                        <p className="text-[9px] font-black text-zinc-400 uppercase tracking-widest">{label}</p>
                        <i data-lucide={icon} className="w-4 h-4 text-zinc-200"></i>
                    </div>
                    <div>
                        <p className={`text-3xl font-black tracking-tighter uppercase truncate leading-none ${color}`}>{value}</p>
                        <p className="text-[9px] font-bold text-zinc-300 uppercase mt-2 tracking-wider">{sub}</p>
                    </div>
                </div>
            );
        }

        function StatusBadge({ status }) {
            const s = (status || "").toUpperCase();
            const isLate = s.includes("ATRASADO");
            const isOk = s.match(/CONCLUÍDA|OK|ENTREGUE/);
            let style = "px-4 py-1.5 rounded-full text-[9px] font-black uppercase border ";
            if (isLate) style += "bg-red-50 text-red-500 border-red-100";
            else if (isOk) style += "bg-emerald-50 text-emerald-600 border-emerald-100";
            else style += "bg-blue-50 text-blue-600 border-blue-100";
            return <span className={style}>{status}</span>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
