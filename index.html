<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoGroup Tax | Efficiency Monitor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --brand-blue: #0066cc; --bg-main: #FDFDFF; }
        body { background-color: var(--bg-main); font-family: 'Inter', sans-serif; overflow: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .premium-card { background: #FFFFFF; border: 1px solid #F1F3F5; border-radius: 2.5rem; box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.03); }
        .sync-loader { height: 4px; background: #F1F3F5; position: relative; overflow: hidden; }
        .sync-loader-fill { height: 100%; background: var(--brand-blue); transition: width 10s linear; }
        .fade-slide-up { animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .status-badge { padding: 6px 16px; border-radius: 14px; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
        .pulse-blue { animation: pulseBlue 2s infinite; }
        @keyframes pulseBlue { 0% { box-shadow: 0 0 0 0 rgba(0, 102, 204, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 102, 204, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 102, 204, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const CONFIG = {
            BASE_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRykG4Z4pN-ICEym8uYRPnvOJ18clvmM8eP5t2l10RBfrPGmad3TagyAF8qczDGBw/pub",
            COMPETENCIAS: [
                { label: "Jan-2026", gid: "1069538796" }, 
                { label: "Fev-2026", gid: "802166840" }
            ],
            ITEMS_PER_PAGE: 5,
            ROTATION_INTERVAL: 10000
        };

        // Nova Sequência de Visualização
        const VIEW_MODES = ['CONCLUÍDO', 'NO PRAZO', 'VENCENDO HOJE', 'ATRASADO'];

        function App() {
            const [data, setData] = useState([]);
            const [activeTab, setActiveTab] = useState(CONFIG.COMPETENCIAS[0]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [viewMode, setViewMode] = useState('CONCLUÍDO'); 
            const [currentPage, setCurrentPage] = useState(0);
            const [time, setTime] = useState(new Date());
            const [key, setKey] = useState(0);

            const parseCSV = (text) => {
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                if (lines.length <= 1) return [];
                const separator = lines[0].includes(';') ? ';' : ',';
                return lines.map(line => {
                    const row = [];
                    let curr = "", inQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        let char = line[i];
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === separator && !inQuotes) { row.push(curr.trim()); curr = ""; }
                        else curr += char;
                    }
                    row.push(curr.trim());
                    return row;
                });
            };

            const fetchData = useCallback(async (retryCount = 0) => {
                setLoading(true);
                setError(null);
                try {
                    const targetUrl = `${CONFIG.BASE_URL}?output=csv&single=true&gid=${activeTab.gid}&t=${Date.now()}`;
                    const response = await fetch(targetUrl);
                    if (!response.ok) throw new Error(`Conexão falhou (${response.status})`);
                    const text = await response.text();
                    const rows = parseCSV(text);
                    if (rows.length <= 1) {
                        setData([]);
                        return;
                    }
                    const dataRows = rows.slice(1);
                    const formatted = dataRows.map((r, i) => ({
                        id: `row-${i}-${activeTab.gid}`,
                        empresa: r[0] ? r[0].replace(/^"|"$/g, '').trim() : "",
                        uf: r[1] ? r[1].replace(/^"|"$/g, '').trim() : "--",
                        regime: r[2] ? r[2].replace(/^"|"$/g, '').trim() : "--",
                        tipo: r[3] ? r[3].replace(/^"|"$/g, '').trim() : "--",
                        obrigacao: r[4] ? r[4].replace(/^"|"$/g, '').trim() : "--",
                        prazo: r[5] ? r[5].replace(/^"|"$/g, '').trim() : "--/--",
                        situacao: (r[6] || "PENDENTE").replace(/^"|"$/g, '').trim().toUpperCase(),
                        responsavel: r[7] ? r[7].replace(/^"|"$/g, '').trim() : "N/A"
                    })).filter(item => item.empresa !== "" && item.empresa.toUpperCase() !== "EMPRESA");
                    setData(formatted);
                } catch (e) { 
                    console.error("Erro Dashboard:", e);
                    if (retryCount < 2) {
                        setTimeout(() => fetchData(retryCount + 1), 2000);
                        return;
                    }
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            }, [activeTab]);

            useEffect(() => {
                fetchData();
                const clock = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(clock);
            }, [fetchData]);

            const metrics = useMemo(() => {
                const total = data.length;
                const concluidas = data.filter(i => ["CONCLU", "OK", "PAGO", "FEITO", "ENTREGUE"].some(s => i.situacao.includes(s))).length;
                const noPrazo = data.filter(i => ["PRAZO", "PENDENTE", "ANDAMENTO", "ABERTO", "NO PRAZO"].some(s => i.situacao.includes(s) && !i.situacao.includes("HOJE") && !i.situacao.includes("VENCENDO"))).length;
                const vencendoHoje = data.filter(i => ["HOJE", "VENCENDO"].some(s => i.situacao.includes(s)) && !["CONCLU", "OK", "PAGO", "FEITO", "ENTREGUE"].some(st => i.situacao.includes(st))).length;
                const atrasadas = data.filter(i => i.situacao.includes("ATRAS")).length;
                const eficiencia = total > 0 ? Math.round((concluidas / total) * 100) : 0;
                return { total, concluidas, noPrazo, vencendoHoje, atrasadas, eficiencia };
            }, [data]);

            const filteredItems = useMemo(() => {
                return data.filter(item => {
                    const s = item.situacao;
                    if (viewMode === 'CONCLUÍDO') return ["CONCLU", "OK", "PAGO", "FEITO", "ENTREGUE"].some(st => s.includes(st));
                    if (viewMode === 'NO PRAZO') return ["PRAZO", "PENDENTE", "ANDAMENTO", "ABERTO", "NO PRAZO"].some(st => s.includes(st) && !s.includes("HOJE") && !s.includes("VENCENDO"));
                    if (viewMode === 'VENCENDO HOJE') return ["HOJE", "VENCENDO"].some(st => s.includes(st)) && !["CONCLU", "OK", "PAGO", "FEITO", "ENTREGUE"].some(st => s.includes(st));
                    return s.includes("ATRAS");
                });
            }, [data, viewMode]);

            const totalPages = Math.ceil(filteredItems.length / CONFIG.ITEMS_PER_PAGE) || 1;

            useEffect(() => {
                if (loading || error) return;
                
                const interval = setInterval(() => {
                    setKey(prev => prev + 1); 
                    setCurrentPage(prev => {
                        if (prev < totalPages - 1) {
                            return prev + 1;
                        } else {
                            setViewMode(current => {
                                const currentIndex = VIEW_MODES.indexOf(current);
                                const nextIndex = (currentIndex + 1) % VIEW_MODES.length;
                                return VIEW_MODES[nextIndex];
                            });
                            return 0;
                        }
                    });
                }, CONFIG.ROTATION_INTERVAL);

                return () => clearInterval(interval);
            }, [totalPages, loading, error]);

            return (
                <div className="h-screen p-10 flex flex-col gap-8">
                    {/* Header */}
                    <div className="flex justify-between items-start">
                        <div className="flex items-center gap-6">
                            <div className="w-16 h-16 bg-blue-600 rounded-[2rem] flex items-center justify-center shadow-xl shadow-blue-100 pulse-blue">
                                <i data-lucide="shield-check" className="text-white w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-5xl font-black text-zinc-900 tracking-tighter leading-none">GoGroup<span className="text-blue-600">.</span>Tax</h1>
                                <div className="flex items-center gap-4 mt-3">
                                    <p className="text-zinc-400 font-bold uppercase tracking-[0.4em] text-[9px]">Monitoramento de Eficiência</p>
                                    <div className="flex gap-1 bg-zinc-100 p-1 rounded-xl">
                                        {CONFIG.COMPETENCIAS.map(c => (
                                            <button key={c.gid} onClick={() => { setActiveTab(c); setCurrentPage(0); }} 
                                                className={`px-4 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${activeTab.gid === c.gid ? 'bg-white text-zinc-900 shadow-sm' : 'text-zinc-400 hover:text-zinc-600'}`}>
                                                {c.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-[2.5rem] border border-zinc-100 shadow-sm flex items-center gap-10">
                            <div className="text-right">
                                <p className="text-[10px] font-black text-zinc-300 uppercase tracking-widest mb-1">Eficiência Operacional</p>
                                <p className={`text-4xl font-black leading-none ${metrics.eficiencia > 80 ? 'text-emerald-500' : 'text-amber-500'}`}>
                                    {metrics.eficiencia}%
                                </p>
                            </div>
                            <div className="w-px h-10 bg-zinc-100"></div>
                            <div className="text-right font-mono text-4xl font-black text-zinc-800 leading-none">
                                {time.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}
                            </div>
                        </div>
                    </div>

                    {/* KPIs - Grid de 5 colunas para acomodar o novo status */}
                    <div className="grid grid-cols-5 gap-4">
                        <KpiCard 
                            label="Obrigações" 
                            value={metrics.total} 
                            icon="file-text" 
                            color="text-zinc-900" 
                            labelColor="text-zinc-800"
                            active={true} 
                        />
                        <KpiCard label="Concluídas" value={metrics.concluidas} icon="check-circle" color="text-emerald-500" active={viewMode === 'CONCLUÍDO'} />
                        <KpiCard label="No Prazo" value={metrics.noPrazo} icon="clock" color="text-blue-500" active={viewMode === 'NO PRAZO'} />
                        <KpiCard label="Vencendo Hoje" value={metrics.vencendoHoje} icon="alert-circle" color="text-orange-500" active={viewMode === 'VENCENDO HOJE'} />
                        <KpiCard label="Atrasadas" value={metrics.atrasadas} icon="flame" color="text-rose-500" active={viewMode === 'ATRASADO'} />
                    </div>

                    {/* Monitor Table */}
                    <div className="flex-1 premium-card flex flex-col overflow-hidden relative">
                        <div className="sync-loader">
                            <div key={key} className="sync-loader-fill" style={{ width: loading ? '0%' : '100%' }}></div>
                        </div>

                        <div className="bg-zinc-900 px-12 py-4 flex justify-between items-center text-white">
                            <div className="flex items-center gap-4">
                                <span className={`flex h-2 w-2 rounded-full ${error ? 'bg-rose-500' : 'bg-blue-500 animate-pulse'}`}></span>
                                <p className="text-[10px] font-black uppercase tracking-[0.3em]">
                                    {error ? `ERRO NA CONEXÃO` : loading ? 'ATUALIZANDO...' : `VISUALIZAÇÃO: ${viewMode} • PÁGINA ${currentPage + 1}/${totalPages}`}
                                </p>
                            </div>
                            <div className="text-[9px] font-black uppercase text-zinc-500 tracking-widest flex items-center gap-2">
                                <i data-lucide="refresh-cw" className="w-3 h-3 animate-spin text-blue-500"></i>
                                Ciclo Contínuo de Monitoramento
                            </div>
                        </div>

                        <div className="flex-1 p-8 overflow-hidden">
                            {error ? (
                                <div className="h-full flex flex-col items-center justify-center text-rose-500 gap-6 text-center">
                                    <i data-lucide="alert-triangle" className="w-16 h-16"></i>
                                    <p className="font-black uppercase text-sm tracking-widest">{error}</p>
                                    <button onClick={() => fetchData()} className="px-8 py-3 bg-zinc-900 text-white rounded-2xl text-[10px] font-black uppercase hover:bg-zinc-800 transition-colors">Tentar Novamente</button>
                                </div>
                            ) : filteredItems.length > 0 ? (
                                <div className="flex flex-col gap-4">
                                    {filteredItems.slice(currentPage * CONFIG.ITEMS_PER_PAGE, (currentPage + 1) * CONFIG.ITEMS_PER_PAGE).map((item, idx) => (
                                        <div key={item.id} className="grid grid-cols-12 px-10 py-6 bg-white rounded-[2rem] border border-zinc-100 items-center shadow-sm fade-slide-up" style={{ animationDelay: `${idx * 0.1}s` }}>
                                            <div className="col-span-3">
                                                <p className="font-black text-zinc-900 uppercase truncate text-lg leading-none mb-1.5">{item.empresa}</p>
                                                <span className="text-[9px] font-bold text-zinc-400 uppercase tracking-widest inline-block">{item.uf} • {item.regime}</span>
                                            </div>
                                            <div className="col-span-4 text-zinc-700 font-extrabold uppercase text-base px-6 truncate">
                                                {item.obrigacao}
                                            </div>
                                            <div className="col-span-2 text-center">
                                                <span className="font-mono font-black text-zinc-800 bg-zinc-50 px-5 py-2.5 rounded-xl border border-zinc-100 text-lg tracking-tighter">
                                                    {item.prazo}
                                                </span>
                                            </div>
                                            <div className="col-span-3 text-right">
                                                <p className="text-[10px] font-black text-zinc-400 uppercase mb-1.5 tracking-tighter">{item.responsavel}</p>
                                                <StatusLabel text={item.situacao} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center text-zinc-200 gap-4">
                                    <div className="relative">
                                        <i data-lucide="inbox" className="w-20 h-20 text-zinc-100"></i>
                                        <div className="absolute -top-1 -right-1 h-6 w-6 bg-blue-500 rounded-full flex items-center justify-center animate-bounce">
                                            <i data-lucide="search" className="w-3 h-3 text-white"></i>
                                        </div>
                                    </div>
                                    <p className="font-black uppercase text-xs tracking-[0.4em] text-zinc-300">Nenhum registro em "{viewMode}"</p>
                                    <p className="text-[9px] text-zinc-400 font-black uppercase tracking-widest bg-zinc-50 px-4 py-2 rounded-lg">Aguarde a próxima rotação automática...</p>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="flex justify-end items-center">
                        <div className="text-[10px] font-black text-zinc-300 uppercase tracking-[0.4em] flex items-center gap-3">
                            <span className="h-3 w-3 bg-blue-500 rounded-full animate-pulse"></span>
                            GoGroup.Tax v3.5 • Ciclo: Concluído > Prazo > Hoje > Atraso
                        </div>
                    </div>
                </div>
            );
        }

        function KpiCard({ label, value, icon, color, active, bg, labelColor }) {
            return (
                <div className={`premium-card p-6 flex flex-col gap-1.5 transition-all duration-500 ${bg || 'bg-white'} ${active ? 'ring-4 ring-blue-500/10 scale-105 shadow-2xl shadow-blue-50' : 'opacity-25'}`}>
                    <div className="flex justify-between items-center mb-0.5">
                        <p className={`text-[9px] font-black uppercase tracking-widest ${labelColor || 'text-zinc-400'}`}>{label}</p>
                        <i data-lucide={icon} className={`w-4 h-4 ${active ? 'text-blue-500' : 'text-zinc-300'}`}></i>
                    </div>
                    <p className={`text-4xl font-black tracking-tighter ${color}`}>{value}</p>
                </div>
            );
        }

        function StatusLabel({ text }) {
            const s = text.toUpperCase();
            let colorClass = "bg-zinc-100 text-zinc-400 border-zinc-200";
            
            // Ordem de prioridade na estilização
            if (["CONCLU", "OK", "PAGO", "FEITO", "ENTREGUE"].some(st => s.includes(st))) {
                colorClass = "bg-emerald-50 text-emerald-600 border-emerald-200";
            } else if (s.includes("ATRAS")) {
                colorClass = "bg-rose-50 text-rose-600 border-rose-200";
            } else if (["HOJE", "VENCENDO"].some(st => s.includes(st))) {
                colorClass = "bg-orange-50 text-orange-600 border-orange-200";
            } else if (["PRAZO", "PENDENTE", "ANDAMENTO", "ABERTO", "NO PRAZO"].some(st => s.includes(st))) {
                colorClass = "bg-blue-50 text-blue-600 border-blue-200";
            }

            return <span className={`status-badge border-2 ${colorClass}`}>{text}</span>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setInterval(() => { if(window.lucide) lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
