<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gocase Tax | Dashboard 2026</title>
    <!-- Bibliotecas essenciais para o Dashboard -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #0F172A; 
            color: #F8FAFC; 
            margin: 0; 
            overflow: hidden; 
        }
        /* Animações de transição de dados */
        .row-fade-in { animation: slideUp 0.6s ease-out forwards; }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        ::-webkit-scrollbar { display: none; }
        .progress-bar { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Configuração da Fonte de Dados
        const SHEET_ID = "2PACX-1vRykG4Z4pN-ICEym8uYRPnvOJ18clvmM8eP5t2l10RBfrPGmad3TagyAF8qczDGBw";
        const BASE_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;
        
        const COMPETENCIAS = [
            { id: '802166840', nome: 'Fevereiro 2026' },
            { id: '0', nome: 'Janeiro 2026' },
            { id: '135792468', nome: 'Março 2026' },
        ];

        const PROXIES = [
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
        ];

        function App() {
            const [data, setData] = useState([]);
            const [meta, setMeta] = useState({ total: '0', efficiency: '0%', acessorias: '0' });
            const [loading, setLoading] = useState(true);
            const [currentPage, setCurrentPage] = useState(0);
            const [selectedGid, setSelectedGid] = useState(COMPETENCIAS[0].id);
            const [time, setTime] = useState(new Date());
            const [syncTime, setSyncTime] = useState("");

            const itemsPerPage = 6; // Aumentado para melhor preenchimento do dashboard
            const pageRotationTime = 12000; // 12 segundos por página

            const parseCSV = (text) => {
                if (!text || text.includes("<!DOCTYPE")) return null;
                const lines = text.split(/\r?\n/).filter(line => line.trim());
                return lines.map(line => {
                    let result = [];
                    let cur = '';
                    let inQuotes = false;
                    for (let char of line) {
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
                        else cur += char;
                    }
                    result.push(cur.trim());
                    return result;
                });
            };

            const fetchData = useCallback(async (gid) => {
                const targetGid = gid || selectedGid;
                // Cache-busting para GitHub: garante que o dado é sempre o mais recente da planilha
                const url = `${BASE_URL}&gid=${targetGid}&nocache=${Date.now()}`;
                
                for (let proxyFn of PROXIES) {
                    try {
                        const res = await fetch(proxyFn(url));
                        if (!res.ok) continue;
                        const text = await res.text();
                        const rows = parseCSV(text);
                        
                        if (rows && rows.length > 5) {
                            setMeta({
                                total: rows[2]?.[1] || '0',
                                efficiency: rows[2]?.[8] || '0%',
                                acessorias: rows[3]?.[1] || '0'
                            });

                            const tasks = rows.slice(5)
                                .filter(r => r[4] && r[4] !== "Obrigação")
                                .map((r, idx) => {
                                    const sit = (r[6] || "").toLowerCase();
                                    const done = ["ok", "conclu", "pago", "entregue"].some(s => sit.includes(s));
                                    const delayed = sit.includes("atrasado");
                                    return {
                                        id: `${targetGid}-${idx}`,
                                        empresa: r[0] || "-",
                                        nome: r[4] || "-",
                                        prazo: r[5] || "-",
                                        status: r[6] || "Pendente",
                                        resp: r[7] || "-",
                                        urgencia: done ? 'done' : (delayed ? 'critical' : 'normal')
                                    };
                                });

                            setData(tasks);
                            setLoading(false);
                            setSyncTime(new Date().toLocaleTimeString('pt-PT'));
                            return;
                        }
                    } catch (e) { console.warn("Tentando próxima rota de sincronização..."); }
                }
            }, [selectedGid]);

            useEffect(() => {
                fetchData();
                const clock = setInterval(() => setTime(new Date()), 1000);
                const sync = setInterval(() => fetchData(), 60000); // Atualiza dados via GitHub/Proxy a cada 1 min
                return () => { clearInterval(clock); clearInterval(sync); };
            }, [fetchData]);

            useEffect(() => {
                if (loading || data.length <= itemsPerPage) return;
                const pager = setInterval(() => {
                    setCurrentPage(prev => (prev + 1) % Math.ceil(data.length / itemsPerPage));
                }, pageRotationTime);
                return () => clearInterval(pager);
            }, [loading, data.length]);

            const currentData = data.slice(currentPage * itemsPerPage, (currentPage + 1) * itemsPerPage);
            const totalPages = Math.ceil(data.length / itemsPerPage) || 1;

            return (
                <div className="h-screen flex flex-col p-6 space-y-6">
                    {loading && (
                        <div className="fixed inset-0 z-50 bg-[#0F172A] flex flex-col items-center justify-center text-white">
                            <div className="w-16 h-16 border-4 border-pink-500 border-t-transparent rounded-full animate-spin shadow-[0_0_20px_#ec4899]"></div>
                            <p className="mt-6 font-black uppercase tracking-[0.5em] text-xs opacity-50">Sincronizando Dashboard...</p>
                        </div>
                    )}

                    {/* Header Gocase Dashboard */}
                    <header className="flex justify-between items-center glass p-6 rounded-[2rem] shadow-2xl">
                        <div className="flex items-center gap-6">
                            <div className="bg-white text-black px-8 py-4 rounded-[1.2rem] font-black text-4xl italic tracking-tighter">
                                gocase<span className="text-pink-500">.</span>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-tighter">Tax Control Unit</h1>
                                <p className="text-slate-400 text-[9px] font-bold uppercase tracking-[0.3em]">GitHub Live Monitoring • 2026</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-8">
                            <div className="text-right border-r border-slate-700 pr-8">
                                <p className="text-slate-500 text-[9px] font-black uppercase mb-1 tracking-widest">Efficiency Rate</p>
                                <div className="text-5xl font-black text-pink-500 tracking-tighter">{meta.efficiency}</div>
                            </div>
                            <div className="flex flex-col">
                                <span className="text-slate-500 text-[9px] font-black uppercase mb-1">Competência</span>
                                <select 
                                    className="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 font-black text-white uppercase text-xs outline-none cursor-pointer hover:bg-slate-700 transition-colors"
                                    value={selectedGid}
                                    onChange={(e) => { setSelectedGid(e.target.value); setLoading(true); fetchData(e.target.value); }}
                                >
                                    {COMPETENCIAS.map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}
                                </select>
                            </div>
                            <div className="text-7xl font-black text-white tracking-tighter ml-4 font-mono">
                                {time.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' })}
                            </div>
                        </div>
                    </header>

                    {/* KPI Tiles */}
                    <div className="grid grid-cols-4 gap-6">
                        <KpiTile label="Total de Obrigações" value={meta.total} sub="Agendadas para o mês" />
                        <KpiTile label="Acessórias" value={meta.acessorias} color="text-pink-500" sub="Obrigações de suporte" />
                        <KpiTile label="Concluídas" value={data.filter(x => x.urgencia === 'done').length} color="text-emerald-400" sub="Entregues com sucesso" />
                        <KpiTile label="Em Aberto" value={data.filter(x => x.urgencia !== 'done').length} color="text-amber-400" sub="Aguardando processamento" />
                    </div>

                    {/* Main Table Container */}
                    <div className="flex-1 glass rounded-[3rem] overflow-hidden flex flex-col relative shadow-inner">
                        <div className="absolute top-0 left-0 w-full h-1.5 bg-slate-800 z-10">
                            <div className="h-full bg-pink-500 progress-bar shadow-[0_0_15px_#ec4899]" 
                                 style={{ width: `${((currentPage + 1) / totalPages) * 100}%` }}></div>
                        </div>

                        <div className="px-12 py-8 flex justify-between items-center border-b border-white/5">
                            <h2 className="text-2xl font-black uppercase tracking-tighter flex items-center gap-3">
                                <div className="w-2 h-6 bg-pink-500 rounded-full animate-pulse"></div>
                                Fluxo de Entregas Ativo
                            </h2>
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700">
                                Pág. {currentPage + 1} de {totalPages}
                            </div>
                        </div>

                        {/* Table Header */}
                        <div className="grid grid-cols-12 gap-8 px-12 py-4 bg-black/20 text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">
                            <div className="col-span-3">Empresa / Entidade</div>
                            <div className="col-span-4">Obrigação Tributária</div>
                            <div className="col-span-2 text-center">Vencimento</div>
                            <div className="col-span-2 text-center">Status</div>
                            <div className="col-span-1 text-right">Owner</div>
                        </div>

                        {/* Table Rows */}
                        <div className="flex-1 px-8 py-4 overflow-hidden flex flex-col gap-4">
                            {currentData.map((item, idx) => (
                                <div key={item.id} className="grid grid-cols-12 gap-8 px-8 py-6 rounded-[1.8rem] bg-slate-800/30 border border-white/5 items-center row-fade-in" style={{ animationDelay: `${idx * 0.1}s` }}>
                                    <div className="col-span-3">
                                        <p className="text-sm font-black text-white uppercase truncate">{item.empresa}</p>
                                        <p className="text-[8px] font-bold text-slate-500 uppercase mt-1 tracking-widest italic">Gocase Corporate</p>
                                    </div>
                                    <div className="col-span-4">
                                        <p className="text-xl font-black text-slate-100 uppercase tracking-tighter truncate">{item.nome}</p>
                                    </div>
                                    <div className="col-span-2 text-center">
                                        <p className="text-4xl font-black text-white tracking-tighter">{item.prazo}</p>
                                    </div>
                                    <div className="col-span-2 flex justify-center">
                                        <span className={`px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border ${
                                            item.urgencia === 'done' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' :
                                            item.urgencia === 'critical' ? 'bg-red-500/10 text-red-400 border-red-500/20 animate-pulse' :
                                            'bg-blue-500/10 text-blue-400 border-blue-500/20'
                                        }`}>
                                            {item.status}
                                        </span>
                                    </div>
                                    <div className="col-span-1 text-right">
                                        <p className="text-xs font-bold text-slate-400 uppercase">{item.resp.split(' ')[0]}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Footer / System Status */}
                    <footer className="flex justify-between items-center px-4">
                        <div className="text-[9px] font-black text-slate-600 uppercase tracking-[0.5em]">Internal Financial Monitoring System</div>
                        <div className="flex items-center gap-4">
                            <div className="text-[9px] font-black text-slate-500 uppercase tracking-widest">
                                Last GitHub Sync: <span className="text-pink-500">{syncTime || "Connecting..."}</span>
                            </div>
                            <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div>
                        </div>
                    </footer>
                </div>
            );
        }

        function KpiTile({ label, value, color = "text-white", sub }) {
            return (
                <div className="glass p-8 rounded-[2.5rem] flex flex-col justify-center h-40 relative overflow-hidden group transition-all hover:border-pink-500/30">
                    <div className="absolute -right-4 -bottom-4 w-24 h-24 bg-white/5 rounded-full blur-2xl group-hover:bg-pink-500/10 transition-colors"></div>
                    <p className="text-[9px] font-black uppercase tracking-widest text-slate-500 mb-1">{label}</p>
                    <p className={`text-6xl font-black tracking-tighter leading-none ${color}`}>{value}</p>
                    <p className="text-[8px] font-bold text-slate-600 uppercase mt-2 italic">{sub}</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
